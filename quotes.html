<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="quotes.css">
</head>
<body>
    <div class="container">
        <div class="header">Quote Generator</div>
        <div class="content">
            <div class="quote_area">
                <p class="quote">Lorem ipsum dolor sit amet consectetur adipisicing elit. Eveniet, consectetur distinctio? Fuga voluptas, deserunt autem asperiores esse voluptatibus ea distinctio commodi qui ut obcaecati numquam consequuntur, corporis nesciunt quisquam accusantium?</p>
                <p class="author">_Unknown</p>
            </div>
        </div>
        <div class="footer">
            <div class="icon">
                <div class="copyBtn">
                    <span class="tooltip">Copy</span>
                    <i class="fa-solid fa-copy"></i>
                </div>
                <div class="sound"><i class="fa-solid fa-volume-high"></i></div>
            </div>
            <div class="btn">
                <button class="prevBtn">Back quotes</button>
                <button class="nextBtn">New quotes</button>
            </div>
        </div>
        
    </div>
    <script src="quotes.js"></script>
</body>
</html>
